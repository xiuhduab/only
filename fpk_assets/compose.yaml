x-fnpack:
  manifest:
    appname: "docker-yundoudou-editor"
    desc: "云豆豆编辑器 - 在浏览器中编辑 Office 文档"
    display_name: "云豆豆编辑器"
    version: "1.0.0"
    maintainer: "tf4fun"
    maintainer_url: "https://github.com/tf4fun"
    distributor: "tf4fun"
    distributor_url: "https://github.com/tf4fun"

  cmd/install_init: |
    #!/bin/bash
    # install_init: 在 app.tgz 解压前修改 compose.yaml

    COMPOSE_FILE="${TRIM_PKGINST_TEMP_DIR}/docker/docker-compose.yaml"

    # 调试：查看 compose 文件是否存在
    if [ ! -f "$COMPOSE_FILE" ]; then
      echo "错误: compose 文件不存在: $COMPOSE_FILE" > "${TRIM_TEMP_LOGFILE}"
      exit 1
    fi

    export COMPOSE_FILE
    python3 >> "${TRIM_TEMP_LOGFILE}" 2>&1 << 'EOF'
    import yaml
    import os
    import glob

    compose_file = os.environ.get('COMPOSE_FILE', '')

    with open(compose_file, 'r') as f:
        data = yaml.safe_load(f)

    volumes = [f"{v}:{v}" for v in sorted(glob.glob('/vol*')) if os.path.isdir(v)]
    data['services']['yundoudou-editor-connector']['volumes'] = volumes

    with open(compose_file, 'w') as f:
        yaml.dump(data, f, default_flow_style=False, allow_unicode=True)

    print(f"volumes 已更新: {volumes}")
    EOF

  wizard/install: |
    [
      {
        "stepTitle": "云豆豆编辑器配置",
        "items": [
          {"type": "tips", "helpText": "配置 JWT 密钥用于安全通信，外网域名用于 HTTPS 协议判断。"},
          {
            "type": "text",
            "helpText": "JWT 密钥，用于 Document Server 安全通信",
            "field": "wizard_jwt_secret",
            "label": "JWT 密钥",
            "initValue": "your-secret-key-change-me",
            "rules": [
              {"required": true, "message": "此字段不能为空"},
              {"min": 16, "max": 64, "message": "长度应在16-64个字符之间"}
            ]
          },
          {
            "type": "text",
            "helpText": "外网域名后缀，用于判断 HTTPS（如 .example.com），留空则全部走 HTTP",
            "field": "wizard_external_domain",
            "label": "外网域名",
            "initValue": ""
          }
        ]
      }
    ]

  app/ui/config: |
    {
      ".url": {
        "docker-yundoudou-editor.editor": {
          "title": "使用云豆豆编辑器打开",
          "icon": "images/icon-{0}.png",
          "type": "iframe",
          "protocol": "http",
          "port": "9080",
          "url": "/editor",
          "allUsers": true,
          "fileTypes": ["docx", "xlsx", "pptx", "doc", "xls", "ppt", "odt", "ods", "odp", "pdf", "txt", "rtf", "csv", "djvu", "oxps", "epub", "fb2"],
          "noDisplay": true
        }
      }
    }

  config/resource: |
    {
      "docker-project": {
        "projects": [{"name": "yundoudou-editor", "path": "docker"}]
      },
      "data-share": {
        "shares": [
          {"name": "yundoudou-editor", "permission": {"rw": ["docker-yundoudou-editor"]}},
          {"name": "yundoudou-editor/data", "permission": {"rw": ["docker-yundoudou-editor"]}},
          {"name": "yundoudou-editor/log", "permission": {"rw": ["docker-yundoudou-editor"]}},
          {"name": "yundoudou-editor/lib", "permission": {"rw": ["docker-yundoudou-editor"]}},
          {"name": "yundoudou-editor/plugins", "permission": {"rw": ["docker-yundoudou-editor"]}},
          {"name": "yundoudou-editor/fonts", "permission": {"rw": ["docker-yundoudou-editor"]}}
        ]
      }
    }

  config/privilege: |
    {"defaults": {"run-as": "root"}}

networks:
  yundoudou-editor-net:
    name: yundoudou-editor-net
    driver: bridge

configs:
  nginx_conf:
    content: |
      worker_processes auto;
      events { worker_connections 1024; }
      http {
          include       /etc/nginx/mime.types;
          default_type  application/octet-stream;
          sendfile        on;
          keepalive_timeout  65;
          map $$host $$is_external {
              ~*${wizard_external_domain:-^$$}$$  1;
              default                             0;
          }
          map $$is_external $$the_scheme {
              1       https;
              default http;
          }
          upstream doc-svr { server yundoudou-editor-doc-svr:80; }
          upstream connector { server yundoudou-editor-connector:10099; }
          server {
              listen 80;
              server_name _;
              location /doc-svr/ {
                  rewrite ^/doc-svr/(.*)$$ /$$1 break;
                  proxy_pass http://doc-svr;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Host $$http_host/doc-svr;
                  proxy_set_header X-Forwarded-Proto $$the_scheme;
              }
              location / {
                  proxy_pass http://connector;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$the_scheme;
              }
          }
      }

services:
  yundoudou-editor-nginx:
    image: nginx:alpine
    container_name: yundoudou-editor-nginx
    networks:
      - yundoudou-editor-net
    restart: unless-stopped
    ports:
      - 9080:80
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    depends_on:
      - yundoudou-editor-connector
      - yundoudou-editor-documentserver

  yundoudou-editor-documentserver:
    image: onlyoffice/documentserver:latest
    container_name: yundoudou-editor-doc-svr
    networks:
      - yundoudou-editor-net
    restart: unless-stopped
    stop_grace_period: 60s
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${wizard_jwt_secret}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/info/info.json"]
      interval: 30s
      retries: 5
      start_period: 60s
      timeout: 10s
    volumes:
      - /var/apps/docker-yundoudou-editor/shares/yundoudou-editor/data:/var/www/onlyoffice/Data
      - /var/apps/docker-yundoudou-editor/shares/yundoudou-editor/log:/var/log/onlyoffice
      - /var/apps/docker-yundoudou-editor/shares/yundoudou-editor/lib:/var/lib/onlyoffice
      - /var/apps/docker-yundoudou-editor/shares/yundoudou-editor/plugins:/var/www/onlyoffice/documentserver/sdkjs-plugins
      - /var/apps/docker-yundoudou-editor/shares/yundoudou-editor/fonts:/usr/share/fonts/truetype/custom

  yundoudou-editor-connector:
    image: ghcr.io/xiuhduab/yundoudou-editor:main
    container_name: yundoudou-editor-connector
    networks:
      - yundoudou-editor-net
    restart: unless-stopped
    environment:
      - DOCUMENT_SERVER_URL=http://yundoudou-editor-doc-svr:80
      - DOCUMENT_SERVER_SECRET=${wizard_jwt_secret}
      - BASE_URL=http://yundoudou-editor-connector:10099
      - DOC_SERVER_PATH=/doc-svr
